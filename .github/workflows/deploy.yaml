name: Docker Project Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_push_to_docker_hub:
      name: Push Docker image to DockerHub
      runs-on: ubuntu-latest
      steps:
        - name: Check out the repo
          uses: actions/checkout@v3
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v2
        - name: Login to Docker
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USER }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        - name: Push Backend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./backend/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/docker-project-backend:latest
        - name: Push Frontend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./frontend/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/docker-project-frontend:latest

  run-with-docker-compose:
    name: Push Docker image to DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build via Docker Compose
        uses: hoverkraft-tech/compose-action@v2.2.0
        with:
          compose-file: "./docker-compose.yml"
          up-flags: "--build -d"
      
      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend to be healthy..."
          for i in {1..30}; do
            STATUS=$(docker inspect backend-app --format='{{.State.Health.Status}}' 2>/dev/null || echo "not found")
            echo "Attempt $i/30: Health status = $STATUS"
            
            if [ "$STATUS" = "healthy" ]; then
              echo "✓ Backend is healthy!"
              exit 0
            fi
            
            # Показываем логи для диагностики
            if [ $((i % 5)) -eq 0 ]; then
              echo "--- Backend logs (last 5 lines) ---"
              docker logs backend-app --tail=5 2>/dev/null || true
            fi
            
            sleep 5
          done
          
          echo "❌ Backend did not become healthy in time"
          echo "Final health status: $(docker inspect backend-app --format='{{.State.Health.Status}}' 2>/dev/null)"
          echo "--- Full backend logs ---"
          docker logs backend-app 2>/dev/null || true
          exit 1
      
      - name: Test backend endpoint
        run: |
          echo "Testing backend endpoint..."
          curl -f http://localhost:8081/health || exit 1
          echo "✓ Backend endpoint works!"
      
      - name: Check all containers
        run: docker ps -a
      
      - name: Cleanup
        if: always()
        run: docker compose down
