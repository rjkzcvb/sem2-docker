name: Docker Project Deploy

on:
  push:
    branches:
      - main

jobs:
  # Собираем образы без пуша в DockerHub
  build_images:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Backend image
        run: |
          docker build -t backend:latest ./backend/
          docker image ls | grep backend
      
      - name: Build Frontend image
        run: |
          docker build -t frontend:latest ./frontend/
          docker image ls | grep frontend

  run-with-docker-compose:
    name: Push Docker image to DockerHub  # Оставляем оригинальное имя
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Create .env file from secrets
        run: |
          echo "APP_ENV=production" > .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "API_KEY=${{ secrets.API_KEY }}" >> .env
      
      - name: Build via Docker Compose
        run: |
          docker-compose -f docker-compose.yml build
          docker-compose -f docker-compose.yml up -d
      
      - name: Test application
        run: |
          sleep 5
          curl -f http://localhost:8081/health || exit 1
          curl -f http://localhost/ || exit 1
          docker-compose logs
      
      - name: Cleanup
        run: docker-compose down
