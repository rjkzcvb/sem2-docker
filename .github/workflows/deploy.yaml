name: Docker Project Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_push_to_docker_hub:
      name: Push Docker image to DockerHub
      runs-on: ubuntu-latest
      steps:
        - name: Check out the repo
          uses: actions/checkout@v3
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v2
        - name: Login to Docker
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USER }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        - name: Push Backend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./backend/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/docker-project-backend:latest
        - name: Push Frontend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./frontend/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/docker-project-frontend:latest

  run-with-docker-compose:
    name: Push Docker image to DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build via Docker Compose
        uses: hoverkraft-tech/compose-action@v2.2.0
        with:
          compose-file: "./docker-compose.yml"
          up-flags: "--build -d"
      
      # ===== ДОБАВЛЕННЫЕ ШАГИ (НЕ МЕНЯЮТ СУЩЕСТВУЮЩИЕ) =====
      - name: Wait for backend
        run: |
          echo "Waiting for backend to be ready..."
          for i in {1..20}; do
            if curl -s -f http://localhost:8081/health > /dev/null 2>&1; then
              echo "✓ Backend is ready!"
              exit 0
            fi
            echo "Attempt $i/20: Backend not ready yet..."
            sleep 3
          done
          echo "Backend did not become ready in time"
          exit 1
      
      - name: Check containers
        run: |
          echo "Container status:"
          docker ps -a
          echo "✓ Containers are running"
      
      - name: Verify backend health
        run: |
          HEALTH_STATUS=$(docker inspect backend-app --format='{{.State.Health.Status}}')
          echo "Backend health status: $HEALTH_STATUS"
          if [ "$HEALTH_STATUS" = "healthy" ]; then
            echo "✓ Backend is healthy!"
          else
            echo "Backend is not healthy"
            exit 1
          fi
      
      - name: Frontend check (non-fatal)
        run: |
          echo "Checking frontend container..."
          if docker ps | grep -q frontend-app; then
            echo "✓ Frontend container is running"
            # Пытаемся получить страницу, но не падаем
            curl -s http://localhost/ > /dev/null && echo "✓ Frontend responds" || echo "⚠ Frontend not responding yet"
          else
            echo "⚠ Frontend container is not running"
          fi
      
      - name: Docker compose logs (for debugging)
        if: always()
        run: |
          echo "=== Docker Compose Logs ==="
          docker compose logs --tail=30
      
      - name: Cleanup
        if: always()
        run: docker compose down
